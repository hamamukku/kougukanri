version: "2"
sql:
  - engine: "postgresql"
    queries: "db/query"
    schema: "db/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/sqlc"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_interface: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
